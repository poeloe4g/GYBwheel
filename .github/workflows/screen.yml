name: Screen and publish dashboard

on:
  schedule:
    # 19:45 UTC, Mon–Fri: 3:45pm ET during EDT, 2:45pm ET during EST — inside
    # regular market hours either way, so option quotes are live (after-close
    # yfinance bid/asks are stale/zeroed and blow up the spread gate).
    # GitHub cron is UTC-only and ignores DST — accept ~1h drift.
    - cron: "45 19 * * 1-5"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (blank = default seed universe)"
        required: false
        default: ""

# Allow committing snapshots back, deploying to Pages, and filing alert issues.
permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

# Don't cancel an in-flight deploy; let runs queue.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  screen-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore screener cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: screener-cache-${{ github.run_id }}
          restore-keys: |
            screener-cache-

      - name: Compute run date
        run: echo "RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      # The only step allowed to fail without poisoning published state.
      # No --sp500-file: the full S&P breadth loop over yfinance is the most
      # rate-limit-fragile/slow part; the breadth signal degrades gracefully.
      - name: Run screener
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="--tickers ${{ github.event.inputs.tickers }}"
          fi
          python main.py $ARGS \
            --json-out "site/data/runs/${RUN_DATE}.json" \
            --output candidates.csv -v

      # Score past runs whose contracts have expired (win = expired above
      # strike). Idempotent append to outcomes.json; a data hiccup here must
      # not block publishing today's run.
      - name: Evaluate outcomes of expired contracts
        continue-on-error: true
        run: python scripts/evaluate_outcomes.py --runs site/data/runs --out site/data/outcomes.json

      # Only reached if the screener exited 0 — keeps the last good latest.json.
      - name: Rebuild dashboard index + latest
        run: python scripts/build_index.py --data-dir site/data

      # Exit 1 on >=3 consecutive zero-candidate (non-RED) runs. Outcome-gated
      # alerting below; continue-on-error keeps the deploy publishing.
      - name: Check zero-candidate streak
        id: streak
        continue-on-error: true
        run: python scripts/check_streak.py --index site/data/index.json --threshold 3

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/runs/"${RUN_DATE}".json site/data/index.json site/data/latest.json
          [ -f site/data/outcomes.json ] && git add site/data/outcomes.json || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: screener run ${RUN_DATE}"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # Idempotent alerts: one open issue per label collects repeats via
      # comments; closing the issue re-arms the alert.
      - name: Alert on zero-candidate streak
        if: steps.streak.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const label = "zero-candidates";
            const title = "Screener has produced 0 candidates for 3+ runs";
            const body = [
              "The scheduled screener has published zero candidates for 3 or more",
              "consecutive non-RED runs. Quality gates may be miscalibrated or the",
              "data feed degraded.",
              "",
              `Latest run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Closing this issue re-arms the alert.",
            ].join("\n");
            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 1 });
            if (open.length) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open[0].number,
                body: `Still zero candidates: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` });
            } else {
              try {
                await github.rest.issues.createLabel({ ...context.repo, name: label, color: "e0a800" });
              } catch (e) { /* label already exists */ }
              await github.rest.issues.create({ ...context.repo, title, body, labels: [label] });
            }

      - name: Alert on workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = "screener-failure";
            const title = "Scheduled screener run failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: label, per_page: 1 });
            if (open.length) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: open[0].number, body: `Failed again: ${runUrl}` });
            } else {
              try {
                await github.rest.issues.createLabel({ ...context.repo, name: label, color: "d73027" });
              } catch (e) { /* label already exists */ }
              await github.rest.issues.create({
                ...context.repo, title, labels: [label],
                body: `The scheduled screener workflow failed.\n\nRun: ${runUrl}\n\nClosing this issue re-arms the alert.` });
            }
