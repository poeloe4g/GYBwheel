# BORING Wheel Screener — thresholds & settings ONLY.
# Secrets (optional FMP_API_KEY) live in .env, never here (B6).

account:
  total_capital: 50000
  max_pct_per_name: 0.05      # per-name collateral cap
  max_pct_per_sector: 0.25    # per-sector collateral cap
  max_pct_deployed: 0.50      # total deployed cap

universe:
  min_market_cap: 20000000000   # $20B
  min_avg_volume: 1000000       # shares/day
  require_profitable: true
  require_positive_fcf: true
  require_options: true
  ban_list: []                  # tickers to always exclude
  allow_list: []                # optional: if non-empty, restrict to these

dte:
  target: 35
  min: 30
  max: 45

delta:
  target: 0.20
  min: 0.15
  max: 0.30

quality:
  min_yield_30dte: 0.005           # min ROC normalized to 30 DTE (~6% annualized floor)
  max_implied_move: 0.15           # 1σ move over contract life (IV*sqrt(DTE/365)); ~IV<=48% at 35 DTE
  max_spread_pct: 0.15             # (ask-bid)/mid
  max_spread_abs: 0.10             # spread passes anyway if (ask-bid) <= this ($), rescues low-premium mids
  min_open_interest: 50
  min_distance_to_strike: 0.03     # (spot-strike)/spot; a 0.2-delta strike at IV~15% sits only ~4% below spot
  avoid_earnings_before_expiry: true   # B2
  risk_free_rate: 0.04                 # B9
  score_denominator_floor: 0.01        # B4 guard

scoring:
  mode: blended                    # blended | annualized_yield_only  (B4)

regime:
  breadth_floor: 0.40              # % of S&P 500 above 50-DMA
  vix_high: 30.0
  spy_falling_lookback: 5          # days for "SPY falling" check

data:
  universe_refresh_days: 7         # B7 — weekly static universe cache
  cache_dir: .cache
  max_retries: 4                   # exponential backoff 2s/4s/8s/16s
